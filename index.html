<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<!-- Marked.js: converts Markdown to HTML -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --surface2: #161d28;
    --border: #1e2d40;
    --border2: #2a3f58;
    --accent: #00c9a7;
    --accent2: #0085ff;
    --text: #d4e2f0;
    --text-muted: #607080;
    --text-dim: #3a4f63;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,20,0.93);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 2rem;
    height: 56px;
    gap: 0;
  }

  .nav-logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    text-decoration: none;
  }

  .nav-logo::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .nav-tabs {
    display: flex;
    list-style: none;
    height: 100%;
  }

  .nav-tabs li { height: 100%; display: flex; align-items: stretch; }

  .nav-tabs a {
    display: flex;
    align-items: center;
    padding: 0 1.1rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .nav-tabs a:hover { color: var(--text); border-bottom-color: var(--border2); }
  .nav-tabs a.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CONTENT AREA ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  /* Loading spinner */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 4rem 0;
  }

  .loading::before {
    content: '';
    width: 14px; height: 14px;
    border: 1px solid var(--text-dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error state */
  .error {
    font-family: var(--mono);
    font-size: 12px;
    color: #e05050;
    padding: 2rem 0;
    border-left: 2px solid #e05050;
    padding-left: 1rem;
  }

  /* ── MARKDOWN CONTENT STYLES ── */
  .md-body h1 {
    font-size: 2rem;
    font-weight: 300;
    color: #eaf2fc;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .md-body h2 {
    font-size: 1.05rem;
    font-weight: 500;
    color: #eaf2fc;
    letter-spacing: 0.02em;
    margin: 2.5rem 0 0.8rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .md-body h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .md-body h3 {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent);
    font-family: var(--mono);
    letter-spacing: 0.05em;
    margin: 1.5rem 0 0.6rem;
  }

  .md-body p {
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 0.9rem;
  }

  .md-body ul, .md-body ol {
    color: var(--text-muted);
    padding-left: 1.4rem;
    margin-bottom: 1rem;
    line-height: 1.8;
  }

  .md-body li { margin-bottom: 3px; }

  .md-body strong { color: var(--text); font-weight: 500; }

  .md-body a { color: var(--accent2); text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }

  .md-body blockquote {
    border-left: 2px solid var(--accent);
    padding: 0.6rem 1rem;
    margin: 1rem 0;
    background: rgba(0,201,167,0.05);
    border-radius: 0 4px 4px 0;
  }

  .md-body blockquote p {
    color: var(--text-muted);
    margin: 0;
    font-size: 13px;
  }

  .md-body code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 3px;
    color: var(--accent);
  }

  .md-body pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    margin: 1rem 0;
  }

  .md-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    color: var(--text-muted);
  }

  .md-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  .md-body img {
    max-width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border);
    margin: 1rem 0;
    display: block;
  }

  .md-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 13px;
  }

  .md-body th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }

  .md-body td {
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
  }

  /* Step/progress heading decoration */
  .md-body h2 .step-status { font-family: var(--mono); font-size: 11px; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#" onclick="loadPage('home'); return false;">PORTFOLIO.SYS</a>
  <ul class="nav-tabs" id="navTabs">
    <!-- Tabs are defined here. To rename a tab, change the text between <a> tags.
         To change which .md file it loads, change the data-file attribute. -->
    <li><a href="#" class="active" data-file="home" onclick="navClick(this); return false;">Overview</a></li>
    <li><a href="#" data-file="initial-planning"   onclick="navClick(this); return false;">Initial Planning</a></li>
    <li><a href="#" data-file="component-selection"   onclick="navClick(this); return false;">Component Selection</a></li>
    <li><a href="#" data-file="CAD-schematics"   onclick="navClick(this); return false;">CAD Schematics</a></li>
    <li><a href="#" data-file="PCB" onclick="navClick(this); return false;">PCB</a></li>
  </ul>
</nav>

<main id="main">
  <div class="loading">Loading...</div>
</main>

<footer>
  <span>PORTFOLIO.SYS // GITHUB PAGES</span>
  <span id="footer-info"></span>
</footer>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  // The folder where your .md files live (relative to index.html)
  const DOCS_FOLDER = 'docs/';

  // ── STATE ───────────────────────────────────────────────────
  let currentFile = null;

  // ── LOAD A PAGE ─────────────────────────────────────────────
  async function loadPage(file) {
    if (file === currentFile) return;
    currentFile = file;

    const main = document.getElementById('main');
    main.innerHTML = '<div class="loading">Loading...</div>';

    try {
      const res = await fetch(DOCS_FOLDER + file + '.md');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const md = await res.text();
      const html = marked.parse(md);
      main.innerHTML = '<div class="md-body">' + html + '</div>';
    } catch (err) {
      main.innerHTML =
        '<div class="error">Could not load docs/' + file + '.md<br>' +
        'Make sure the file exists in your docs/ folder.<br><br>' +
        'Error: ' + err.message + '</div>';
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── NAV CLICK ───────────────────────────────────────────────
  function navClick(el) {
    document.querySelectorAll('.nav-tabs a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    loadPage(el.dataset.file);
    window.location.hash = el.dataset.file;
}

  // ── INIT ────────────────────────────────────────────────────
  document.getElementById('footer-info').textContent =
    new Date().getFullYear() + ' // ALL SYSTEMS OPERATIONAL';

  const startPage = window.location.hash.replace('#', '') || 'home';
const startLink = document.querySelector('[data-file="' + startPage + '"]');
if (startLink) {
    startLink.classList.add('active');
    document.querySelector('.nav-tabs a.active:not([data-file="' + startPage + '"])').classList.remove('active');
}
loadPage(startPage);
</script>
</body>
</html>
